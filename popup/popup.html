<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span>Flow</span>
      </div>
      <button class="icon-btn" id="btn-options" title="Settings">⚙️</button>
    </header>

    <!-- Goal Area -->
    <section class="goal-section" id="section-set-goal">
      <p class="goal-prompt">Set your goal to start blocking distractions.</p>
      <div class="input-row">
        <textarea id="goal-input" class="goal-input" placeholder="What's your focus today?" rows="2" maxlength="300"></textarea>
      </div>
      <button class="btn btn-primary" id="btn-set-goal">
        <span id="goal-btn-text">Set Goal ⚡</span>
        <div class="spinner" id="goal-spinner" style="display:none"></div>
      </button>
      <div class="error-msg" id="goal-error" style="display:none"></div>
    </section>

    <section class="goal-active" id="section-active-goal" style="display:none">
      <div class="active-label">Today's goal</div>
      <div class="active-goal-text" id="active-goal-text"></div>
      <button class="link-btn" id="btn-reset-goal">Change</button>
    </section>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Loading...</span>
      <span class="stat-chip" id="stat-chip"></span>
    </div>

    <!-- API Key Banner -->
    <div class="api-banner" id="api-banner" style="display:none">
      <span>🔑 Add API key for AI features</span>
      <button class="link-btn" id="btn-banner-settings">Settings →</button>
    </div>

    <!-- Quick Controls -->
    <div class="controls" id="controls" style="display:none">
      <button class="ctrl-btn" id="btn-pause-5">⏸ 5 min</button>
      <button class="ctrl-btn" id="btn-pause-15">⏸ 15 min</button>
      <button class="ctrl-btn" id="btn-pause-30">⏸ 30 min</button>
      <button class="ctrl-btn ctrl-danger" id="btn-toggle-off" style="display:none">Turn Off</button>
      <button class="ctrl-btn ctrl-success" id="btn-toggle-on" style="display:none">Resume</button>
    </div>

    <div class="divider"></div>

    <!-- Manual Blocklist -->
    <section class="blocklist-section">
      <div class="section-header">
        <span class="section-title">Manual Blocklist</span>
        <span class="count-badge" id="manual-count">0</span>
      </div>

      <div class="add-site-row">
        <input type="text" class="site-input" id="site-input" placeholder="e.g. reddit.com" />
        <button class="btn btn-add" id="btn-add-site">+</button>
      </div>

      <ul class="site-list" id="manual-list">
        <li class="site-empty" id="manual-empty">No sites added yet.</li>
      </ul>
    </section>

    <!-- AI Blocklist preview -->
    <div id="ai-section" style="display:none">
      <div class="divider"></div>
      <section class="blocklist-section">
        <div class="section-header">
          <span class="section-title">AI Blocked</span>
          <span class="count-badge ai" id="ai-count">0</span>
        </div>
        <ul class="site-list ai-list" id="ai-list"></ul>
      </section>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
