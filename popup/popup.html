<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../utils/tokens.css" />
  <link rel="stylesheet" href="popup.css" />
  <script src="../utils/theme.js"></script>
</head>
<body>
<div class="popup">

  <header class="header">
    <div class="logo">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="var(--primary)"/>
      </svg>
      <span class="logo-name">Flow</span>
    </div>
    <div class="header-end">
      <button class="icon-btn" id="btn-options" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M8 1.5v1.3M8 13.2v1.3M1.5 8h1.3M13.2 8h1.3M3.3 3.3l.9.9M11.8 11.8l.9.9M12.7 3.3l-.9.9M4.2 11.8l-.9.9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Goal input (no goal set) -->
  <section class="section" id="section-set-goal">
    <div class="section-label">Today's focus</div>
    <div class="input-wrap">
      <textarea id="goal-input" class="textarea" placeholder="What are you working on today?" rows="2" maxlength="300"></textarea>
    </div>
    <button class="btn btn-filled btn-block" id="btn-set-goal">
      <span id="goal-btn-text">Set goal</span>
      <div class="spinner" id="goal-spinner" style="display:none"></div>
    </button>
    <div class="msg msg-error" id="goal-error" style="display:none"></div>
  </section>

  <!-- Active goal -->
  <div class="goal-bar" id="section-active-goal" style="display:none">
    <div class="goal-bar-dot"></div>
    <div class="goal-bar-body">
      <div class="goal-bar-label">Focus goal</div>
      <div class="goal-bar-text" id="active-goal-text"></div>
    </div>
    <button class="text-btn" id="btn-reset-goal">Change</button>
  </div>

  <!-- Status -->
  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Loading…</span>
    <span class="chip" id="stat-chip" style="display:none"></span>
  </div>

  <div class="section">
    <div class="section-row">
      <span class="section-label">Blocked sites</span>
      <span class="count" id="manual-count">0</span>
    </div>
    <div class="add-row">
      <input type="text" class="input-text" id="site-input" placeholder="reddit.com" />
      <button class="btn btn-filled btn-icon" id="btn-add-site">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <ul class="list" id="manual-list">
      <li class="list-empty">No sites added</li>
    </ul>
  </div>

  <!-- AI blocklist -->
  <div class="section" id="ai-section" style="display:none">
    <div class="section-row">
      <span class="section-label">AI blocked</span>
      <span class="count count-ai" id="ai-count">0</span>
    </div>
    <ul class="list" id="ai-list"></ul>
  </div>

  <footer class="footer">
    <button class="footer-link" id="btn-settings-footer">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M8 1.5v1.3M8 13.2v1.3M1.5 8h1.3M13.2 8h1.3M3.3 3.3l.9.9M11.8 11.8l.9.9M12.7 3.3l-.9.9M4.2 11.8l-.9.9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Open Settings
    </button>
  </footer>

</div>
<script src="popup.js"></script>
</body>
</html>
