<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blocked — Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="utils/tokens.css" />
  <link rel="stylesheet" href="blocked.css" />
  <script src="utils/theme.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="var(--primary)"/>
      </svg>
      <span>Flow</span>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="block-icon">🚫</div>
        <div class="block-domain" id="block-domain">Site Blocked</div>
        <p class="block-sub">This site was blocked to keep you focused.</p>
        <div class="goal-box" id="goal-reminder">
          <div class="goal-label">Your goal today</div>
          <div class="goal-text" id="goal-text">Loading…</div>
        </div>
        <div class="ai-box" id="ai-reason" style="display:none">
          <span class="ai-tag">AI</span>
          <span id="ai-reason-text"></span>
        </div>
        <div class="actions">
          <button class="btn btn-outline" id="btn-back">← Go back to work</button>
        </div>
      </div>
    </div>

    <div class="card" id="appeal-section">
      <div class="appeal-hd">
        <h2>Think this is a mistake?</h2>
        <span class="appeal-count" id="appeal-count"></span>
      </div>
      <div class="appeal-body">
        <p class="appeal-desc">Explain how this site helps your goal. Flow AI will decide.</p>
        <textarea id="appeal-input" class="textarea" placeholder="e.g., I need this for a tutorial on…" maxlength="500" rows="3"></textarea>
        <div class="char"><span id="char-count">0</span>/500</div>
        <button class="btn btn-filled" id="btn-appeal">
          <span id="appeal-btn-text">Submit appeal</span>
          <div class="spinner" id="appeal-spinner" style="display:none"></div>
        </button>
        <div class="verdict" id="verdict" style="display:none">
          <div class="verdict-icon" id="verdict-icon"></div>
          <div><div class="verdict-title" id="verdict-title"></div><div class="verdict-reason" id="verdict-reason"></div></div>
        </div>
      </div>
    </div>

    <div class="card" id="no-api-card" style="display:none">
      <div class="card-body no-api">
        <p>Add a Gemini API key in <a id="btn-settings">Flow settings</a> to use the appeal system.</p>
      </div>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
